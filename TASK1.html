<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>
</head>

<body style="font-family:Arial;background:#f4f4f4;padding:40px">

<h2>Student Registration</h2>

<form action="task1_store.php" method="POST" 
style="background:white;padding:20px;width:300px;border-radius:10px">

Name <br>
<input type="text" name="name" required style="width:100%"><br><br>

Email <br>
<input type="email" name="email" required style="width:100%"><br><br>

DOB <br>
<input type="date" name="dob" required style="width:100%"><br><br>

Department <br>
<select name="dept" style="width:100%">
<option>CSE</option>
<option>IT</option>
<option>ECE</option>
</select><br><br>

Phone <br>
<input type="text" name="phone" required style="width:100%"><br><br>

<button style="background:blue;color:white;padding:8px">Register</button>

</form>

</body>
</html>
